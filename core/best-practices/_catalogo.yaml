# Catálogo de best-practices — RAG manual barato (ideia validada no OpenSquad).
# O /montar-squad lê SÓ este índice e carrega apenas os docs cujo whenToUse casa com os
# papéis/domínio do squad. Adicione entradas novas mantendo o padrão (1 assunto por doc).
praticas:
  - id: escolher-modelos
    arquivo: escolher-modelos.md
    whenToUse: "SEMPRE na Fase 2 do /montar-squad (sugestão de 3 modelos por papel) e quando o usuário perguntar qual modelo/IA usar para uma tarefa"
  - id: spec-driven
    arquivo: spec-driven.md
    whenToUse: "todo papel que PRODUZ algo (dev, copy, análise, operações) — como trabalhar contra spec e o que fazer diante de ambiguidade"
  - id: evidencia-e-harness
    arquivo: evidencia-e-harness.md
    whenToUse: "todo papel executor e todo revisor — o que conta como evidência, anti-burla, honestidade de dado"
  - id: revisao
    arquivo: revisao.md
    whenToUse: "papéis revisores (arquiteto em software; revisor dedicado em conteúdo/análise) — rubrica, vereditos, loops"
  - id: analise-de-dados
    arquivo: analise-de-dados.md
    whenToUse: "papéis de análise (analista de vendas, dados, métricas, relatórios) — método, sanidade, hipótese vs conclusão"
  - id: conteudo-criativo
    arquivo: conteudo-criativo.md
    whenToUse: "papéis de conteúdo (copy, social, vídeo, marketing) — brief, voz, honestidade de claim, direitos"
  - id: engenharia-agentica
    arquivo: engenharia-agentica.md
    whenToUse: "TODO papel executor antes de implementar qualquer task (pré-voo das 5 Karpathy Guidelines: suposições, simplicidade, mudança cirúrgica, critério verificável, prova) e o orquestrador ao calibrar a rédea/autonomia por task"
  - id: design-distintivo
    arquivo: design-distintivo.md
    whenToUse: "OBRIGATÓRIA p/ squad-ux, squad-dev-front e squad-dev-mobile em qualquer tela nova ou redesign — anti-template de IA, tokens primeiro, elemento-assinatura, copy como design; canônico do projeto sempre vence"
  - id: qualidade-de-spec
    arquivo: qualidade-de-spec.md
    whenToUse: "arquiteto/especificador antes do gate humano de toda SPEC — checklist que valida a ESCRITA da spec (clareza, gaps, ambiguidade, rastreabilidade)"
  - id: migracao-de-banco
    arquivo: migracao-de-banco.md
    whenToUse: "papéis de dados/devops ao criar ou revisar migração de banco — numeração, imutabilidade, reversão, compatibilidade, locks"
  - id: seguranca-de-api
    arquivo: seguranca-de-api.md
    whenToUse: "dev-back e reviewer em qualquer endpoint/API — authz por recurso, validação de borda, segredos, P0/P1 de segurança"
  - id: seo-youtube
    arquivo: seo-youtube.md
    whenToUse: "papéis de conteúdo digital (YouTube, blog, social) — CTR×retenção, metadados, intenção de busca, honestidade de promessa"
  - id: financas-planilhas-pessoais
    arquivo: financas-planilhas-pessoais.md
    whenToUse: "squads de vida pessoal/organização — planilhas financeiras, conferência com evidência, privacidade, rotina de revisão"
